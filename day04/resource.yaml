
apiVersion: v1
kind: Pod
metadata:
  name: resource-pod
spec:
  containers:
  - name: stress
    image: polinux/stress
    resources:
      requests:
        memory: "1Mi"
        cpu: "1m"
      limits:
        memory: "1Mi"
        cpu: "10m"
    command: ["stress"]
    args: ["--vm", "1", "--vm-bytes", "200M"]

